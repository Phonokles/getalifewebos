<!DOCTYPE html>
<html lang="de">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount:wght@100..900&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Kalender</title>
  <link rel="stylesheet" href="kalenderapp.css">
</head>
<body>
<div class="app-window" id="app-window">
  <div class="titlebar" id="titlebar">
    <div class="titlebar-buttons">
      <div class="tb-btn tb-close" id="tb-close"></div>
      <div class="tb-btn tb-min"></div>
      <div class="tb-btn tb-max"></div>
    </div>
    <span class="titlebar-title">Kalender</span>
    <div class="titlebar-actions">
      <button class="view-btn">Woche</button>
      <button class="view-btn active">Monat</button>
    </div>
  </div>
  <div class="app-body">
    <div class="sidebar">
      <div class="sidebar-month-nav">
        <button class="nav-btn" id="prev-mini">&#8249;</button>
        <span id="mini-month-label"></span>
        <button class="nav-btn" id="next-mini">&#8250;</button>
      </div>
      <div class="mini-cal" id="mini-cal"></div>
      <div class="sidebar-no-events">Keine Termine</div>
    </div>
    <div class="main-cal">
      <div class="main-cal-header">
        <button class="nav-btn" id="prev-main">&#8249;</button>
        <button class="nav-btn" id="next-main">&#8250;</button>
        <span class="main-cal-title" id="main-month-label"></span>
        <span class="main-cal-year" id="main-year-label"></span>
      </div>
      <div class="weekday-headers">
        <div class="weekday-header">MO</div>
        <div class="weekday-header">DI</div>
        <div class="weekday-header">MI</div>
        <div class="weekday-header">DO</div>
        <div class="weekday-header">FR</div>
        <div class="weekday-header">SA</div>
        <div class="weekday-header">SO</div>
      </div>
      <div class="month-grid" id="month-grid"></div>
    </div>
  </div>
</div>
<script src="kalenderapp.js"></script>
</body>
</html>
