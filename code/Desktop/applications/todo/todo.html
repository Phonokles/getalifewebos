<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="todo.css">
</head>
<body>
  <div class="todo-app">
    <div class="todo-header">
      <span class="todo-title">Todo</span>
    </div>
    <div class="todo-body" id="todo-body"></div>
    <div class="todo-add-row">
      <input type="text" id="todo-new-input" class="todo-new-input" placeholder="add a todo...">
      <button class="todo-add-btn" id="todo-add-btn">+</button>
    </div>
  </div>

  <script src="todo.js"></script>
</body>
</html>
