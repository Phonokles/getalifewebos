<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings-layout">

    <aside class="sidebar">
      <div class="sidebar-header">SETTINGS</div>
      <nav>
        <button class="nav-item active" data-panel="backgrounds">
          <svg width="15" height="15" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.496" stroke-linecap="round" stroke-linejoin="round">
            <path d="M28.65,21.33l4.93,7.74L35,27a.86.86,0,0,1,.1-.16,1.79,1.79,0,0,1,.51-.48l.05,0,.1-.06.06,0,.1,0,.09,0,.09,0,.08,0,.07,0,.12,0h.43l.15,0,.18.05.16,0a0,0,0,0,0,0,0l.15.07h0a2,2,0,0,1,.55.46l.09.13v0l0,.06s0,0,0,0l5.1,7.54a1.84,1.84,0,0,1-1.61,2.73H6.32a1.84,1.84,0,0,1-1.84-1.84,1.81,1.81,0,0,1,.23-.88L19.29,11.67c0-.06.07-.11.1-.16v0a1.8,1.8,0,0,1,.54-.49l.15-.08s0,0,0,0l.14-.06h0l.13,0,.07,0,.1,0h.57l.11,0h0l.15,0h0l.14,0h0l0,0,.14.07a1.92,1.92,0,0,1,.66.61.35.35,0,0,0,0,.08l0,0,1.71,2.68"/>
            <line x1="24.22" y1="14.38" x2="28.65" y2="21.33"/>
            <path d="M28.64,21.18a5.36,5.36,0,1,0-3.59-5.49"/>
          </svg>
          Backgrounds
        </button>
        <button class="nav-item" data-panel="themes">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none"/>
          </svg>
          Themes
        </button>
        <button class="nav-item" data-panel="pets">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="15" r="4"/>
            <circle cx="6" cy="9" r="2"/>
            <circle cx="18" cy="9" r="2"/>
            <circle cx="9" cy="5" r="1.8"/>
            <circle cx="15" cy="5" r="1.8"/>
          </svg>
          Pets
        </button>
      </nav>
    </aside>

    <main class="content">
      <section class="panel active" id="panel-backgrounds">
        <h2 class="panel-title">Backgrounds</h2>
        <p class="panel-description">Wähle ein Wallpaper für deinen Desktop.</p>
        <div class="wallpaper-grid" id="wallpaper-grid"></div>
      </section>

      <section class="panel" id="panel-themes">
        <h2 class="panel-title">Themes</h2>
        <p class="panel-description">Wechsle zwischen dunkler und heller Darstellung.</p>
        <div class="setting-row">
          <div class="setting-row-text">
            <span class="setting-row-label">Appearance</span>
            <span class="setting-row-value" id="theme-switch-label">Dark</span>
          </div>
          <button class="ts" id="theme-switch" type="button" role="switch" aria-label="Theme wechseln">
            <span class="ts-track">
              <span class="ts-knob">
                <svg class="ts-icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <circle cx="12" cy="12" r="4"/>
                  <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                </svg>
                <svg class="ts-icon moon" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
              </span>
            </span>
          </button>
        </div>
      </section>

      <section class="panel" id="panel-pets">
        <h2 class="panel-title">Pets</h2>
        <p class="panel-description">Lege fest, wie viele und welche Tiere durch die Taskbar streunen.</p>
        <div class="pets-list" id="pets-list"></div>
      </section>
    </main>

  </div>
  <script src="settings.js"></script>
</body>
</html>
