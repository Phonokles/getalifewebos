<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="calculator.css">
</head>
<body>
  <div class="calc">
    <div class="calc-display" id="calc-display">0</div>

    <div class="calc-grid">
      <button class="calc-btn calc-fn" data-action="clear">C</button>
      <button class="calc-btn calc-fn" data-action="backspace">⌫</button>
      <button class="calc-btn calc-fn" data-action="percent">%</button>
      <button class="calc-btn calc-op" data-action="operator" data-value="÷">÷</button>

      <button class="calc-btn" data-action="digit" data-value="7">7</button>
      <button class="calc-btn" data-action="digit" data-value="8">8</button>
      <button class="calc-btn" data-action="digit" data-value="9">9</button>
      <button class="calc-btn calc-op" data-action="operator" data-value="×">×</button>

      <button class="calc-btn" data-action="digit" data-value="4">4</button>
      <button class="calc-btn" data-action="digit" data-value="5">5</button>
      <button class="calc-btn" data-action="digit" data-value="6">6</button>
      <button class="calc-btn calc-op" data-action="operator" data-value="-">−</button>

      <button class="calc-btn" data-action="digit" data-value="1">1</button>
      <button class="calc-btn" data-action="digit" data-value="2">2</button>
      <button class="calc-btn" data-action="digit" data-value="3">3</button>
      <button class="calc-btn calc-op" data-action="operator" data-value="+">+</button>

      <button class="calc-btn calc-zero" data-action="digit" data-value="0">0</button>
      <button class="calc-btn" data-action="decimal">.</button>
      <button class="calc-btn calc-equals" data-action="equals">=</button>
    </div>
  </div>

  <script src="calculator.js"></script>
</body>
</html>
