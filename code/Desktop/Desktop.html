<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount:wght@100..900&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Have a life WebOS -- Desktop</title>
  <link rel="stylesheet" href="Desktop.css">
</head>
<body>

  <div class="topbar">
    <div class="topbar-center">
      <span id="topbar-date"></span>
      <span class="topbar-sep">   </span>
      <span id="topbar-time"></span>
    </div>
    <div class="topbar-right">
      <button class="power-btn" id="power-btn" title="Systemmenü">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 2v7"/>
          <path d="M5.5 5.5A9 9 0 1 0 18.5 5.5"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="power-popup" id="power-popup">
    <button class="power-option shutdown" id="opt-shutdown">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v7"/><path d="M5.5 5.5A9 9 0 1 0 18.5 5.5"/></svg>
      Herunterfahren
    </button>
    <button class="power-option" id="opt-lock">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="11" width="14" height="11" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
      Sperren
    </button>
    <button class="power-option" id="opt-reboot">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      Neustart
    </button>
  </div>
  <div class="clock-popup" id="clock-popup">
    <div class="popup-left">
      <div class="popup-bell">x</div>
      <div class="popup-no-notif">Keine Benachrichtigungen</div>
      <div class="popup-dnd">
        <span>Nicht stören</span>
        <div class="dnd-toggle" id="dnd-toggle">
          <div class="dnd-knob"></div>
        </div>
      </div>
    </div>
    <div class="popup-right">
      <div class="popup-date-big" id="popup-date-big"></div>
      <div class="popup-calendar" id="popup-calendar"></div>
      <div class="popup-today">
        <div class="popup-today-label">Heute</div>
        <div class="popup-today-empty">Keine Termine</div>
      </div>
    </div>
  </div>

  <div class="wallpaper" id="wallpaper"></div>

  <footer class="footer">
    <div class="fox-wrapper" id="fox-wrapper">
      <img src="../assets/red_idle_8fps.gif" id="fox-idle" class="fox-frame fox-idle" alt="fox idle">
      <img src="../assets/red_lie_8fps.gif" id="fox-lie" class="fox-frame fox-lie" alt="fox lie">
      <img src="../assets/red_walk_8fps.gif" id="fox-walk" class="fox-frame fox-walk" alt="fox walk">
    </div>
    <div class="footer-indicator" id="footer-indicator"></div>
      <div class="taskbar-apps">
      <button class="taskbar-app-btn" onclick="openSettings()" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </footer>

  <link rel="stylesheet" href="taskbar/taskbar.css">
  <script src="taskbar/taskbar.js"></script>
  <link rel="stylesheet" href="topbar/topbar.css">
  <script src="topbar/topbar.js"></script>
  <div class="lock-screen" id="lock-screen">
    <img class="lock-avatar" src="../assets/profile.jpg" alt="Profil">
    <button class="unlock-btn" id="unlock-btn">Unlock</button>
  </div>
  <link rel="stylesheet" href="../lock/lock.css">
  <script src="../lock/lock.js"></script>
  <link rel="stylesheet" href="windows/window.css">
  <script src="windows/window.js"></script>
</body>
</html>
