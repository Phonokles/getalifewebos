<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="topbar.css">
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-center">
        <span id="topbar-date"></span>
        <span id="topbar-time"></span>
      </div>
      <div class="topbar-right">
        <button class="power-btn" id="power-btn" title="Systemmenü">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <path d="M12 2v7"/>
          <path d="M5.5 5.5A9 9 0 1 0 18.5 5.5"/>
        </svg>
      </button>
    </div>
    <div class="power-popup" id="power-popup">
      <button class="power-option shutdown" id="opt-shutdown">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v7"/><path d="M5.5 5.5A9 9 0 1 0 18.5 5.5"/></svg>
        Herunterfahren
      </button>
      <button class="power-option" id="opt-lock">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="11" width="14" height="11" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        Sperren
      </button>
      <button class="power-option" id="opt-reboot">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        Neustart
      </button>
    </div>
    <script src="topbar.js"></script>
  </body>
</html>
